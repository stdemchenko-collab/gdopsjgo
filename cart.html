<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - Online Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="brand-actions">
                    <h1 class="logo"><a href="index.html"><img src="image/Apex.png" alt="Apex logo"></a></h1>
                    <button id="themeToggle" class="theme-toggle-btn" type="button">🌙 Тёмная тема</button>
                </div>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Главная</a>
                    <a href="index.html#products" class="nav-link">Товары</a>
                    <a href="cart.html" class="nav-link cart-link active">
                        🛒 Корзина <span class="cart-count">0</span>
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <h2>Корзина покупок</h2>

            <div id="emptyCart" class="empty-cart">
                <p>Ваша корзина пуста</p>
                <a href="index.html" class="btn btn-primary">Продолжить покупки</a>
            </div>

            <div id="cartContent" class="cart-content" style="display: none;">
                <div class="cart-items">
                    <table class="cart-table">
                        <thead>
                            <tr>
                                <th>Товар</th>
                                <th>Цена</th>
                                <th>Количество</th>
                                <th>Сумма</th>
                                <th>Действие</th>
                            </tr>
                        </thead>
                        <tbody id="cartItems">
                            <!-- Товары в корзине будут загружены здесь -->
                        </tbody>
                    </table>
                </div>

                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Подтвержение:</span>
                        <span id="subtotal">0 ₽</span>
                    </div>
                    <div class="summary-row">
                        <span>Доставка:</span>
                        <span id="shipping">0 ₽</span>
                    </div>
                    <div class="summary-row total">
                        <span>Итого:</span>
                        <span id="total">0 ₽</span>
                    </div>
                    <button id="checkoutBtn" class="btn btn-primary btn-large">Оформить заказ</button>
                    <a href="index.html" class="btn btn-secondary btn-large">Продолжить покупки</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Online Store. Все права защищены.</p>
            <p>Контакты: info@store.com | +7 (999) 123-45-67</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="cart.js"></script>
    <script src="theme.js"></script>
</body>
</html>
